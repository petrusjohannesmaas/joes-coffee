<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee shop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
</head>

<body>
    <header>
        <div class="alert-bar is-micro">
            <p id="alert-message"><!-- This is filled with JS --></p>
        </div>
        <header class="navbar">
            <div class="row">
                <div class="col col-4 navbar-logo">
                    <img src="/coffee-shop/images/logo.png" alt="Logo" />
                </div>
                <div class="col col-4"><!--This is a spacer--> </div>
                <nav class="col col-4 navbar-links">
                    <a href="#home">Home</a>
                    <a href="#about">About</a>
                    <a href="#shop">Shop</a>
                    <a href="#locations">Locations</a>
                </nav>
            </div>
            <div>
                <h1>Small Craft Artisan Roasters.</h1>
                <h1>Community Driven. Always Fresh</h1>
            </div>
            <a href="#shop" class="button">Shop coffee</a>
            <a href="#locations" class="button">Visit us</a>
        </header>

    </header>

    <main>
        <div class="row is-large">
            <div class="col col-sm-12 col-md-4 col-4">
                <img src="/coffee-shop/images/bag.png" alt="Coffee bag">
                <h4>Blend 1</h4>
                <h5>$123.00</h5>
            </div>
            <div class="col col-sm-12 col-md-4 col-4">
                <img src="/coffee-shop/images/bag.png" alt="Coffee bag">
                <h4>Blend 2</h4>
                <h5>$123.00</h5>
            </div>
            <div class="col col-sm-12 col-md-4 col-4">
                <img src="/coffee-shop/images/bag.png" alt="Coffee bag">
                <h4>Blend 3</h4>
                <h5>$123.00</h5>
            </div>
        </div>
        <div class="row">
            <div class="container">
                <button style="padding: 20px;" href="#shop">Shop coffee</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Petrus Maas</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
